version: '3.8'

services:
  app:
    build:
      context: .
      target: development
      dockerfile: Dockerfile
    container_name: nextjs-app
    ports:
      - "3000:3000"
    volumes:
      - /app/node_modules
      - /app/.next
    environment:
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    command: pnpm run dev
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - .next/
        - action: rebuild
          path: package.json
        - action: rebuild
          path: pnpm-lock.yaml

  storybook:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: storybook-ui
    ports:
      - "6006:6006"
    volumes:
      - /app/node_modules
    environment:
      - WATCHPACK_POLLING=true
    command: npx storybook dev -p 6006 --ci --host 0.0.0.0
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - storybook-static/
        - action: rebuild
          path: package.json
        - action: rebuild
          path: pnpm-lock.yaml