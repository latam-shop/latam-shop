name: Next.js CI

on:
  push:
    branches: ["main", "dev", "stg"]
  pull_request:
    branches: ["main", "dev", "stg"]

jobs:
  build-and-test:
    name: Quality Assurance (Lint, Type-check, Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and Type-check
        run: |
          pnpm next lint
          pnpm tsc --noEmit

      - name: Run unit tests
        run: pnpm test

      - name: Build project
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
