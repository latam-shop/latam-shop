name: LATAMSHOP CI/CD - Staging

on:
  pull_request:
    branches: ["stg"]
  push:
    branches: ["stg"]

jobs:
  stg-validation:
    runs-on: ubuntu-latest
    container:
      image: node:20-alpine
    environment: staging

    steps:
      - name: Install Git
        run: apk add --no-cache git

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and Type-check
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test

      - name: Build Staging Bundle
        run: pnpm build
